<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Translator Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <!-- Use FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #22c55e;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --text: #f8fafc;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --sidebar-bg: rgba(31, 41, 55, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            height: 100%;
            display: flex;
            padding: 2rem;
            gap: 2rem;
            position: relative;
            background: radial-gradient(circle at 10% 10%, #111827, #030712);
        }

        /* --- Header / Top Bar --- */
        .top-bar {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .settings-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
        }

        /* --- Main Content Area --- */
        .main-content {
            flex-grow: 1;
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Overlays --- */
        .match-badge {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 2px solid var(--accent);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--accent);
            z-index: 20;
        }

        .match-badge span {
            font-size: 0.6rem;
            text-transform: uppercase;
            margin-top: -2px;
        }

        .prediction-overlay {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 1.5rem 2rem;
            text-align: center;
            z-index: 20;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .prediction-overlay h2 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            z-index: 100;
        }

        .control-pill {
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            padding: 1rem 0.5rem;
            gap: 1rem;
            width: 100%;
            align-items: center;
        }

        .sidebar-btn {
            background: transparent;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sidebar-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-btn.active {
            color: var(--primary);
            background: rgba(0, 242, 254, 0.1);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        .sidebar-btn.record-btn {
            width: 56px;
            height: 56px;
            border: 2px solid var(--glass-border);
        }

        .sidebar-btn.record-btn.active {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .nav-item:hover, .nav-item.active {
            color: #fff;
        }

        /* --- Settings Panel (Modal) --- */
        #settings-panel {
            position: fixed;
            top: 50%;
            right: -400px;
            transform: translateY(-50%);
            width: 320px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--glass-border);
            height: 80vh;
            border-radius: 24px 0 0 24px;
            z-index: 1000;
            padding: 2rem;
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        #settings-panel.open {
            right: 0;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .close-settings {
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .setting-item label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: 600;
        }

        input[type="range"], select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.5rem;
            color: #fff;
            outline: none;
        }

        .history-log {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.75rem;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
        }

        .status-pill {
            padding: 4px 12px;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            display: inline-block;
        }

        @media (max-width: 768px) {
            #app-container {
                padding: 1rem;
                flex-direction: column;
            }
            .sidebar {
                flex-direction: row;
                width: 100%;
                height: 80px;
                order: 2;
            }
            .control-pill {
                flex-direction: row;
                height: 100%;
                padding: 0 1rem;
            }
            .prediction-overlay h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div id="app-container">
        <div class="top-bar">
            <div class="logo">PSL Translator</div>
            <button class="settings-btn" id="open-settings">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>

        <main class="main-content">
            <video id="input_video" playsinline></video>
            <canvas id="output_canvas"></canvas>
            
            <div class="match-badge" id="match-badge">
                <span id="confText">0%</span>
                <span>Match</span>
            </div>

            <div class="prediction-overlay">
                <h2 id="prediction">NONE</h2>
            </div>
        </main>

        <aside class="sidebar">
            <div class="control-pill">
                <button class="sidebar-btn" id="voiceToggleBtn" title="Toggle Voice">
                    <i class="fa-solid fa-volume-high" id="voiceIcon"></i>
                </button>
                <button class="sidebar-btn record-btn" id="toggleBtn" title="Start/Stop AI Engine">
                    <i class="fa-solid fa-circle-dot"></i>
                </button>
            </div>
            
            <a href="#" class="nav-item active" title="History">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>History</span>
            </a>
            <a href="#" class="nav-item" title="Learn">
                <i class="fa-solid fa-book-open"></i>
                <span>Learn</span>
            </a>
        </aside>

        <!-- Settings Modal/Panel -->
        <div id="settings-panel">
            <div class="settings-header">
                <h3>Settings</h3>
                <button class="close-settings" id="close-settings"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="setting-item">
                <label>System Status</label>
                <div class="status-pill" id="status">Active</div>
            </div>

            <div class="setting-item">
                <label>Optical Source</label>
                <select id="cameraSelect">
                    <option value="">Detecting...</option>
                </select>
            </div>

            <div class="setting-item">
                <label>Speech Rate: <span id="rateVal">1.0x</span></label>
                <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="1.0">
            </div>

            <div class="setting-item">
                <label>Engine Latency</label>
                <input type="range" id="strideRange" min="1" max="15" value="6">
            </div>

            <button id="clearBtn" class="sidebar-btn" style="width: 100%; border: 1px solid var(--glass-border); border-radius: 8px; color: #ef4444;">
                <i class="fa-solid fa-trash-can"></i> Clear History
            </button>

            <div class="setting-item" style="flex-grow: 1;">
                <label>History Log</label>
                <div class="history-log" id="historyLog">
                    <div>System initialized...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const predictionText = document.getElementById('prediction');
        const confText = document.getElementById('confText');
        const statusText = document.getElementById('status');
        const toggleBtn = document.getElementById('toggleBtn');
        const clearBtn = document.getElementById('clearBtn');
        const voiceToggleBtn = document.getElementById('voiceToggleBtn');
        const voiceIcon = document.getElementById('voiceIcon');
        const cameraSelect = document.getElementById('cameraSelect');
        const strideRange = document.getElementById('strideRange');
        const rateRange = document.getElementById('rateRange');
        const rateVal = document.getElementById('rateVal');
        const historyLog = document.getElementById('historyLog');
        
        // Paneling
        const openSettings = document.getElementById('open-settings');
        const closeSettings = document.getElementById('close-settings');
        const settingsPanel = document.getElementById('settings-panel');

        openSettings.onclick = () => settingsPanel.classList.add('open');
        closeSettings.onclick = () => settingsPanel.classList.remove('open');

        let sequence = [];
        let predictionHistory = [];
        let probabilityHistory = [];
        let sentence = [];
        let isPredicting = true;
        let isFetching = false;
        let frameCounter = 0;
        let zeroHandCounter = 0;
        let activeCamera = null;
        let cooldownFrames = 0; 
        let isVoiceEnabled = true;

        const SEQUENCE_LENGTH = 30;
        let PREDICTION_STRIDE = 6;
        const SMOOTHING_WINDOW = 5;
        const ADD_THRESHOLD = 0.8;
        const API_URL = 'http://localhost:8000/predict';

        function updateStatus(text, type = 'normal') {
            statusText.innerText = text;
            statusText.style.color = type === 'error' ? '#ef4444' : '#22c55e';
            statusText.style.background = type === 'error' ? 'rgba(239, 68, 68, 0.1)' : 'rgba(34, 197, 94, 0.1)';
        }

        function addHistory(text) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const entry = document.createElement('div');
            entry.style.marginBottom = '5px';
            entry.style.paddingBottom = '5px';
            entry.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
            entry.innerHTML = `<span style="opacity: 0.5;">[${time}]</span> ${text}`;
            historyLog.prepend(entry);
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    window.drawConnectors(canvasCtx, landmarks, window.HAND_CONNECTIONS, { color: '#00f2fe', lineWidth: 4 });
                    window.drawLandmarks(canvasCtx, landmarks, { color: '#ffffff', lineWidth: 1, radius: 2 });
                }
            }
            canvasCtx.restore();

            if (isPredicting) {
                processLandmarks(results);
            }
        }

        function extractLandmarks(results) {
            let lh = new Array(63).fill(0);
            let rh = new Array(63).fill(0);
            let handsDetected = 0;

            if (results.multiHandLandmarks && results.multiHandedness) {
                handsDetected = results.multiHandLandmarks.length;
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const label = results.multiHandedness[index].label;
                    const flat = landmarks.flatMap(l => [l.x, l.y, l.z]);
                    if (label === 'Left') lh = flat;
                    else rh = flat;
                });
            }
            return { keypoints: [...lh, ...rh], handsDetected };
        }

        async function processLandmarks(results) {
            const { keypoints, handsDetected } = extractLandmarks(results);

            if (handsDetected === 0) {
                zeroHandCounter++;
                if (zeroHandCounter > 15) {
                    sequence = [];
                    predictionText.innerText = "WAITING...";
                    confText.innerText = '0%';
                }
            } else {
                zeroHandCounter = 0;
            }

            sequence.push(keypoints);
            if (sequence.length > SEQUENCE_LENGTH) {
                sequence.shift();
            }

            frameCounter++;
            if (cooldownFrames > 0) cooldownFrames--;

            if (sequence.length === SEQUENCE_LENGTH && frameCounter % PREDICTION_STRIDE === 0 && !isFetching && handsDetected > 0) {
                isFetching = true;
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ landmarks: sequence })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const allPreds = data.all_predictions;

                        probabilityHistory.push(allPreds);
                        if (probabilityHistory.length > SMOOTHING_WINDOW) probabilityHistory.shift();

                        const actions = Object.keys(allPreds);
                        let smoothed = {};
                        actions.forEach(action => {
                            let sum = 0;
                            probabilityHistory.forEach(p => sum += p[action] || 0);
                            smoothed[action] = sum / probabilityHistory.length;
                        });

                        const sortedActions = actions.sort((a, b) => smoothed[b] - smoothed[a]);
                        const topAction = sortedActions[0];
                        const topConfidence = smoothed[topAction];

                        predictionText.innerText = topAction;
                        confText.innerText = Math.round(topConfidence * 100) + '%';

                        if (topConfidence > ADD_THRESHOLD && cooldownFrames === 0) {
                            predictionHistory.push(topAction);
                            if (predictionHistory.length > 4) predictionHistory.shift();

                            const isConsistent = predictionHistory.every(v => v === topAction && v !== 'NONE');

                            if (isConsistent) {
                                if (sentence.length === 0 || sentence[sentence.length - 1] !== topAction) {
                                    sentence.push(topAction);
                                    if (sentence.length > 10) sentence.shift();
                                    
                                    addHistory(`Detected: <b>${topAction}</b>`);

                                    if (isVoiceEnabled && topAction !== 'NONE') {
                                        speak(topAction);
                                    }

                                    cooldownFrames = 30; 
                                    predictionHistory = [];
                                }
                            }
                        }
                    }
                } catch (err) {
                    updateStatus('API Disconnected', 'error');
                } finally {
                    isFetching = false;
                }
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        async function setupCamera(deviceId = null) {
            updateStatus('Initializing Camera...');
            if (activeCamera) {
                await activeCamera.stop();
            }

            const constraints = deviceId ? { deviceId: { exact: deviceId } } : {};

            activeCamera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                ...constraints,
                width: 1280,
                height: 720
            });

            try {
                await activeCamera.start();
                updateStatus('System Active');
            } catch (err) {
                updateStatus('Access Error', 'error');
            }
        }

        async function listCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = videoDevices.map(device =>
                    `<option value="${device.deviceId}">${device.label || `Camera ${cameraSelect.length + 1}`}</option>`
                ).join('');

                if (videoDevices.length > 0) {
                    cameraSelect.onchange = () => setupCamera(cameraSelect.value);
                }
            } catch (err) {}
        }

        function speak(text) {
            if (!window.speechSynthesis || !isVoiceEnabled) return;
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = parseFloat(rateRange.value);
            window.speechSynthesis.speak(utterance);
        }

        // --- Event Listeners ---
        toggleBtn.onclick = () => {
            isPredicting = !isPredicting;
            toggleBtn.classList.toggle('active');
            if (!isPredicting) {
                predictionText.innerText = 'PAUSED';
                addHistory('AI Engine Suspended');
            } else {
                addHistory('AI Engine Resumed');
            }
        };

        voiceToggleBtn.onclick = () => {
            isVoiceEnabled = !isVoiceEnabled;
            voiceIcon.className = isVoiceEnabled ? 'fa-solid fa-volume-high' : 'fa-solid fa-volume-xmark';
            voiceToggleBtn.classList.toggle('active');
        };

        rateRange.oninput = () => {
            rateVal.innerText = rateRange.value + 'x';
        };

        strideRange.oninput = () => {
            PREDICTION_STRIDE = parseInt(strideRange.value);
        };

        clearBtn.onclick = () => {
            sentence = [];
            historyLog.innerHTML = '<div>Log cleared...</div>';
            predictionText.innerText = 'READY';
        };

        // --- Initialize ---
        listCameras();
        setupCamera();

        function resizeCanvas() {
            canvasElement.width = videoElement.clientWidth;
            canvasElement.height = videoElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        videoElement.addEventListener('loadedmetadata', resizeCanvas);
    </script>
</body>

</html>
